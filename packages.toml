# Upstream source configuration for AUR packages maintained by cbrnr.
# The package list itself is fetched live from the AUR maintainer API;
# this file only maps package names to their upstream source metadata.
#
# Supported source types and their required fields:
#
#   source = "pypi"        pypi_name = "<PyPI package name>"
#   source = "github"      github = "<owner>/<repo>"
#   source = "sourceforge" sourceforge_project = "<project>"
#                          sourceforge_path = "<RSS path>"
#                          version_regex = '<regex with one capture group>'
#   source = "website"     url = "<URL>"
#                          version_regex = '<regex with one capture group>'
#                          version_compact = true  # e.g. "214" → "2.14"
#   source = "svn"         svn_url = "<SVN repo URL>"
#
# Optional for any source:
#   upstream_url = "<URL>"  # overrides the auto-derived link shown in issues

[edfbrowser]
source = "website"
url = "https://www.teuniz.net/edfbrowser/"
version_regex = 'edfbrowser_(\d+)_source\.tar\.gz'
version_compact = true

[libbiosig]
source = "sourceforge"
sourceforge_project = "biosig"
sourceforge_path = "/BioSig for C_C++/src/"
version_regex = 'biosig-([0-9]+\.[0-9]+\.[0-9]+)\.src\.tar\.xz'
upstream_url = "https://sourceforge.net/projects/biosig/"

[libxdf]
source = "github"
github = "xdf-modules/libxdf"

[nbc]
source = "sourceforge"
sourceforge_project = "bricxcc"
sourceforge_path = "/NBC_NXC/"
version_regex = 'nbc-([0-9]+\.[0-9]+\.[0-9]+\.r[0-9]+)\.'
upstream_url = "http://bricxcc.sourceforge.net/nbc/"

[nexttool-svn]
source = "svn"
svn_url = "https://svn.code.sf.net/p/bricxcc/code/"
upstream_url = "https://sourceforge.net/p/bricxcc/code/"

